<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width" initial-scale="1.0">
  <meta name="author" content="Mehedi Rahman Mahi">
  <meta name="description" content="Personal website of Mehedi Rahman Mahi">
  <meta name="keywords" content="Mehedi Rahman Mahi, mehedirm6244, mebesus">

  <title>mehedirm6244</title>
  <link rel="icon" type="image/x-icon" href="./assets/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Barlow font from Google API -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Devicon CDN -->
  <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

  <!-- CSS Only -->
  <link rel="stylesheet" href="./src/output.css" />

  <!-- Parallax JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js"></script>
</head>

<body class="bg-bg-500 text-white selection:bg-blue selection:text-bg-500">

  <!-- Loading screen -->
  <div id="loading_screen" class="z-50 fixed top-0 left-0 h-screen w-screen bg-bg-500 flex items-center justify-center">
    <i class="fa fa-gear text-6xl animate-[spin_2s_linear_infinite]"></i>
  </div>

  <!-- Header -->
  <section class="p-12 md:p-16 h-screen flex align-middle justify-between items-center bg-fixed bg-cover bg-bottom border-b border-white/30" style="background-image: url('./assets/bg.png');">

    <!-- IDK what this div does now but the layout breaks if I remove it -->
    <div class="p-2 md:p-8">
      <div class="w-full md:w-[480px]">
        <img class="h-[100px] md:h-[125px] mb-4 md:mb-6 rounded-full reveal" src="./assets/pfp.png" alt="Profile picture">
        <div class="mt-3 md:mt-0 reveal delay-[200ms]">
          <p class="text-md font-semibold text-lightGray">Hello, I'm</p>
          <p class="text-3xl md:text-4xl font-semibold">Mehedi Rahman Mahi</p>
          <p class="text-xl md:text-2xl">
            A <span id="typewriter" class="text-green"></span>
            <span class="animate-blink">_</span>
          </p>

          <div class="mt-6 inline-block space-x-2 reveal delay-[400ms]">
            <a href="https://mehedirm6244.github.io/portfolio.html">
              <button class="bg-white/5 border border-white/30 px-4 py-2 text-white rounded-md duration-100 hover:bg-white/10">
                <i class="fa fa-user mr-2"></i>Portfolio
              </button>
            </a>
            <a href="https://mehedirm6244.github.io/blogs.html">
              <button class="bg-white/5 border border-white/30 px-4 py-2 text-white rounded-md duration-100 hover:bg-white/10">
                <i class="fa fa-pen mr-2"></i>My Blogs
              </button>
            </a>
          </div>
      </div>

      <!-- Parallax JS div -->
      <div class="absolute top-0 right-0 h-screen p-14 overflow-hidden flex align-middle items-start md:items-center">
        <div class="reveal mr-0 md:mr-[-120px] lg:mr-0">
          <div id="moon">
            <div data-depth="0.3"><img src="./assets/moon.svg" class="w-[128px] md:w-[300px]"></div>
          </div>
          <div id="clouds">
            <div data-depth="0.9"><img src="./assets/cloud.svg" class="w-[144px] md:w-[356px] mt-[-48px] md:mt-[-96px]"></div>
          </div>
        </div>
      </div>
    </div>

  </section>

  <!-- Initialize parallax effect -->
  <script>
    var moon = document.getElementById('moon');
    var parallaxInstanceMoon = new Parallax(moon);
    var clouds = document.getElementById('clouds');
    var parallaxInstanceClouds = new Parallax(clouds);
  </script>

  <script type="text/javascript">
    var i = 0, j = 0;
    const intro = ['student at morning', 'learner at noon', 'coder at midnight'];
    const myName = document.getElementById("typewriter");

    function typeWriterWrite() {
      if (j < intro[i].length) {
        myName.innerHTML += intro[i].charAt(j);
        j++;
        setTimeout(typeWriterWrite, 100);
      } else {
        setTimeout(function() {
          i = (i+1) % intro.length;
          j = 0;
          typeWriterErase();
        }, 2000);
      }
    }

    function typeWriterErase() {
      myName.innerHTML = myName.innerHTML.substring(0, myName.innerHTML.length - 1)
      if (myName.innerHTML.length == 0) {
        setTimeout(typeWriterWrite, 50);
      } else {
        setTimeout(typeWriterErase, 50);
      }
    }

    window.onload = function() {
      document.getElementById("loading_screen").style.display = "none";
    }

    typeWriterWrite();
  </script>

  <script src="./scripts/contextmenu.js"></script>
  <script src="./scripts/animate.js"></script>

</body>
</html>
